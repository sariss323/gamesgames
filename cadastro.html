<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - GameGames</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="fundocadastro">
    <header class="topo">
        <div class="topoesquerda">
            <div class="logo">
                <a href="index.html">
                    <img src="Game.png" alt="Logo GameGames">
                </a>
            </div>

            <nav class="menu">
                <a href="index.html">Categorias</a>
                <a href="starwars.html">Star Wars</a>
                <a href="colecionadores.html">Colecionadores</a>
                <a href="novidades.html">Novidades</a>
            </nav>
        </div>

        <div class="topodireita">
            <div class="buscar glasscard">
                <input type="text" placeholder="Pesquisar">
                <img src="lupa-arredondada.png" alt="Buscar">
            </div>

            <div class="icones">
                <div class="icone">
                    <a href="contato.html">
                        <img src="conversando.png" alt="Mensagens">
                    </a>
                </div>
                <div class="icone">
                    <img src="caminhao-de-entrega.png" alt="Entrega" class="iconecaminhao">
                </div>
                <div class="icone">
                    <a href="login.html">
                        <img src="perfil.png">
                    </a>
                </div>
                <div class="icone">
                    <img src="carrinho-carrinho.png" alt="Carrinho">
                </div>
            </div>
        </div>
    </header>

    <main class="centro">
        <div class="caixacadastro">

            <h1 class="titulo">Cadastro</h1>

            <form action="index.html" method="get">
                <div class="campo">
                    <label>Nome</label>
                    <div class="entrada">
                        <input type="text" id="nome" name="nome" placeholder="Nome">
                        <img src="do-utilizador.png" alt="Icone usuario" class="iconescadastro">
                    </div>
                </div>

                <div class="campo">
                    <label>Sobrenome</label>
                    <div class="entrada">
                        <input type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                        <img src="do-utilizador.png" alt="Icone usuario" class="iconescadastro">
                    </div>
                </div>

                <div class="campo">
                    <label>CPF</label>
                    <div class="entrada">
                        <input type="text" id="cpf" name="cpf" placeholder="CPF">
                        <img src="cpf.png" alt="Icone CPF" class="iconescadastro">
                    </div>
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <div class="entrada">
                        <input type="text" id="telefone" name="telefone" placeholder="Telefone">
                        <img src="telefone.png" alt="Icone telefone" class="iconescadastro">
                    </div>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <div class="entrada">
                        <input type="email" id="email-cadastro" name="email" placeholder="Digite um email">
                        <img src="o-email.png" alt="Icone email" class="iconescadastro">
                    </div>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <div class="entrada">
                        <input type="password" id="senha-cadastro" name="senha" placeholder="Digite uma senha">
                        <img src="cadeado-trancado%20(1).png" alt="Icone senha" class="iconescadastro">
                    </div>
                </div>

                <button type="submit" class="botao">Cadastrar</button>
            </form>

            <p class="textofinal">
                Ja tem uma conta?
                <a href="login.html">Entrar</a>
            </p>
        </div>
    </main>
</body>

</html>
