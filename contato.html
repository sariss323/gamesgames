<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Contato - GameGames</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header class="topopreto">
    <div class="topoesquerda">
        <div class="logo">
            <a href="index.html">
                <img src="Game.png" alt="Logo GameGames">
            </a>
        </div>

        <nav class="menu">
            <a href="index.html">Categorias</a>
            <a href="starwars.html">Star Wars</a>
            <a href="colecionadores.html">Colecionadores</a>
            <a href="novidades.html">Novidades</a>
        </nav>
    </div>

    <div class="topodireita">
        <div class="buscar glasscard">
            <input type="text" placeholder="Pesquisar">
            <img src="lupa-arredondada.png" alt="Buscar">
        </div>

        <div class="icones">
            <div class="icone">
                <img src="conversando.png" alt="Mensagens">
            </div>
            <div class="icone">
                <img src="caminhao-de-entrega.png" alt="Entrega" class="iconecaminhao">
            </div>
            <div class="icone">
                <a href="login.html">
                    <img src="perfil.png">
                </a>
            </div>
            <div class="icone">
                <img src="carrinho-carrinho.png" alt="Carrinho">
            </div>
        </div>
    </div>
</header>

<main class="conteudocontato">
    <section class="ladoesquerdo">
    </section>

    <section class="ladodireito">
        <h1 class="titulocontato">Entre em contato conosco</h1>

        <form action="contato.html">
            <div class="campo">
                <label>Nome</label>
                <div class="entrada">
                    <input type="text" id="nome-contato" name="nome" placeholder="Nome">
                </div>
            </div>

            <div class="campo">
                <label>Email</label>
                <div class="entrada">
                    <input type="email" id="email-contato" name="email" placeholder="Email">
                </div>
            </div>

            <div class="campo">
                <label>Assunto</label>
                <div class="entrada">
                    <input type="text" id="assunto-contato" name="assunto" placeholder="Assunto">
                </div>
            </div>

            <div class="campo">
                <label>Mensagem</label>
                <textarea id="mensagem-contato" name="mensagem" class="campotexto"
                          placeholder="Digite sua mensagem..."></textarea>
            </div>

            <button type="submit" class="botaocontato">Enviar</button>
        </form>
    </section>
</main>
</body>

</html>
